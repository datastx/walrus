apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: wal-capture
  namespace: walrus
  labels:
    app.kubernetes.io/name: wal-capture
    app.kubernetes.io/part-of: walrus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: wal-capture
      app.kubernetes.io/part-of: walrus
  namespaceSelector:
    matchNames:
      - walrus
  endpoints:
    - port: health
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
