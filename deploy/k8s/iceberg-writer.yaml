apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-writer
  namespace: walrus
  labels:
    app.kubernetes.io/name: iceberg-writer
    app.kubernetes.io/part-of: walrus
    app.kubernetes.io/component: iceberg-writer
    app.kubernetes.io/managed-by: kustomize
spec:
  # Can scale to multiple replicas -- file queue claiming is atomic and per-table.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: iceberg-writer
      app.kubernetes.io/part-of: walrus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iceberg-writer
        app.kubernetes.io/part-of: walrus
        app.kubernetes.io/component: iceberg-writer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: iceberg-writer
          image: ghcr.io/datastx/walrus/iceberg-writer:latest
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 8082
              protocol: TCP
          env:
            - name: PG_HOST
              value: "localhost"
            - name: PG_PORT
              value: "5432"
            - name: PG_DATABASE
              value: "sourcedb"
            - name: PG_USER
              value: "replicator"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgiceberg-secret
                  key: PG_PASSWORD
            - name: PG_TLS_MODE
              value: "prefer"
            - name: STAGING_ROOT
              value: "/data/staging"
            - name: WAREHOUSE_PATH
              value: "/data/iceberg"
            - name: PGICEBERG_CONFIG
              value: "/etc/pgiceberg/pgiceberg.toml"
            - name: RUST_LOG
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: staging-data
              mountPath: /data/staging
              readOnly: true
            - name: warehouse-data
              mountPath: /data/iceberg
            - name: config
              mountPath: /etc/pgiceberg
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: staging-data
          persistentVolumeClaim:
            claimName: staging-data
        - name: warehouse-data
          persistentVolumeClaim:
            claimName: warehouse-data
        - name: config
          configMap:
            name: pgiceberg-config
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-writer
  namespace: walrus
  labels:
    app.kubernetes.io/name: iceberg-writer
    app.kubernetes.io/part-of: walrus
    app.kubernetes.io/component: iceberg-writer
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: iceberg-writer
    app.kubernetes.io/part-of: walrus
  ports:
    - name: health
      port: 8082
      targetPort: health
      protocol: TCP
