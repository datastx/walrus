apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: staging-data
  namespace: walrus
  labels:
    app.kubernetes.io/part-of: walrus
    app.kubernetes.io/component: storage
    app.kubernetes.io/managed-by: kustomize
spec:
  accessModes:
    - ReadWriteMany
  # Set storageClassName to match your cluster's RWX-capable provisioner
  # (e.g., nfs-client for NFS, etc.)
  # storageClassName: nfs-client
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: warehouse-data
  namespace: walrus
  labels:
    app.kubernetes.io/part-of: walrus
    app.kubernetes.io/component: storage
    app.kubernetes.io/managed-by: kustomize
spec:
  accessModes:
    - ReadWriteMany
  # Set storageClassName to match your cluster's RWX-capable provisioner
  # storageClassName: nfs-client
  resources:
    requests:
      storage: 100Gi
