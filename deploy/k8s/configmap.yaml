apiVersion: v1
kind: ConfigMap
metadata:
  name: pgiceberg-config
  namespace: walrus
  labels:
    app.kubernetes.io/part-of: walrus
    app.kubernetes.io/managed-by: kustomize
data:
  pgiceberg.toml: |
    [source]
    host = "localhost"
    port = 5432
    database = "sourcedb"
    user = "replicator"
    password_env = "PG_PASSWORD"
    slot_name = "pgiceberg_slot"
    publication_name = "pgiceberg_pub"

    [source.tables]
    # schema.table = { pk = ["col1", "col2"] }
    # PK is auto-detected from pg_index if omitted.
    "public.users" = {}
    "public.orders" = {}
    "public.products" = { pk = ["product_id"] }

    [staging]
    root = "/data/staging"
    cleanup_after_hours = 24

    [wal_capture]
    max_parallel_tables = 4
    max_parallel_workers_per_table = 2
    rows_per_partition = 500_000

    # CDC flush policy: flush triggers when ANY threshold is reached.
    # Set a threshold to 0 to disable that trigger.
    max_batch_rows = 50_000
    max_batch_bytes = 67_108_864      # 64 MiB
    flush_interval_seconds = 30
    idle_timeout_seconds = 60

    [iceberg_writer]
    warehouse_path = "/data/iceberg"
    catalog_db_path = "/data/iceberg/catalog.db"
    poll_interval_seconds = 5
    max_files_per_batch = 100
    compaction_interval_hours = 6
    compaction_delete_threshold = 50
    max_retries = 3
