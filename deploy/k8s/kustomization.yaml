apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: walrus

labels:
  - pairs:
      app.kubernetes.io/part-of: walrus
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - wal-capture.yaml
  - iceberg-writer.yaml
  - servicemonitor.yaml

# Uncomment to set a common image tag across all deployments:
# images:
#   - name: ghcr.io/datastx/walrus/wal-capture
#     newTag: v0.1.0
#   - name: ghcr.io/datastx/walrus/iceberg-writer
#     newTag: v0.1.0

# Uncomment to add a name prefix for multi-environment deploys:
# namePrefix: staging-

# Uncomment to override the namespace:
# namespace: walrus-staging
