apiVersion: apps/v1
kind: Deployment
metadata:
  name: wal-capture
  namespace: walrus
  labels:
    app.kubernetes.io/name: wal-capture
    app.kubernetes.io/part-of: walrus
    app.kubernetes.io/component: wal-capture
    app.kubernetes.io/managed-by: kustomize
spec:
  # WAL Capture MUST run as a single replica.
  # Only one instance can consume a Postgres logical replication slot.
  replicas: 1
  strategy:
    # Recreate ensures the old pod is fully terminated before the new one starts,
    # preventing split-brain WAL consumption.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wal-capture
      app.kubernetes.io/part-of: walrus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wal-capture
        app.kubernetes.io/part-of: walrus
        app.kubernetes.io/component: wal-capture
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wal-capture
          image: ghcr.io/datastx/walrus/wal-capture:latest
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: PG_HOST
              value: "localhost"
            - name: PG_PORT
              value: "5432"
            - name: PG_DATABASE
              value: "sourcedb"
            - name: PG_USER
              value: "replicator"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgiceberg-secret
                  key: PG_PASSWORD
            - name: PG_SLOT_NAME
              value: "pgiceberg_slot"
            - name: PG_PUBLICATION_NAME
              value: "pgiceberg_pub"
            - name: PG_TLS_MODE
              value: "prefer"
            - name: STAGING_ROOT
              value: "/data/staging"
            - name: PGICEBERG_CONFIG
              value: "/etc/pgiceberg/pgiceberg.toml"
            - name: RUST_LOG
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: staging-data
              mountPath: /data/staging
            - name: config
              mountPath: /etc/pgiceberg
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: staging-data
          persistentVolumeClaim:
            claimName: staging-data
        - name: config
          configMap:
            name: pgiceberg-config
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wal-capture
  namespace: walrus
  labels:
    app.kubernetes.io/name: wal-capture
    app.kubernetes.io/part-of: walrus
    app.kubernetes.io/component: wal-capture
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wal-capture
    app.kubernetes.io/part-of: walrus
  ports:
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
